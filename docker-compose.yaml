networks:
  auth-network:
    driver: bridge
  db-network:
    driver: bridge
  kong-network:
    driver: bridge
  messaging-network:
    driver: bridge

services:

  postgres:
    image: postgres:16
    container_name: postgres
    networks:
      - db-network
    environment:
      POSTGRES_DB: petquest-db
      POSTGRES_USER: petquest-db
      POSTGRES_PASSWORD: idpacs1234
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petquest-db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    networks:
      - messaging-network
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db-service:
    build: ../Database-Service
    container_name: db-service
    networks:
      - auth-network
      - db-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petquest-db
      SPRING_DATASOURCE_USERNAME: petquest-db
      SPRING_DATASOURCE_PASSWORD: idpacs1234
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build: ../Authentication-Service
    container_name: auth-service
    networks:
      - auth-network
      - kong-network
    environment:
      DB_SERVICE_BASE_URL: http://db-service:8082
      JWT_SECRET: 256-bit-super-secret-key-for-jwt-petquest-idp
      JWT_ACCESS_TOKEN_EXPIRY: 900000
      JWT_REFRESH_TOKEN_EXPIRY: 2592000000
    depends_on:
      - db-service

  task-service:
    build: ../Task-Service
    container_name: task-service
    networks:
      - db-network
      - kong-network
      - messaging-network
    environment:
      DB_SERVICE_BASE_URL: http://db-service:8082
      JWT_SECRET: 256-bit-super-secret-key-for-jwt-petquest-idp
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      db-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  kong:
    image: kong:3.6
    container_name: kong
    networks:
      - kong-network
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong.yaml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./kong.yaml:/kong.yaml
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - auth-service
      - task-service
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: